<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorForge AI | Dashboard</title>
    <style>
        :root {
            --twitch-purple: #9146ff;
            --twitch-dark: #0e0e10;
            --twitch-card: #1f1f23;
            --twitch-text: #efeff1;
        }
        body {
            background-color: var(--twitch-dark);
            color: var(--twitch-text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--twitch-card);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 1px solid rgba(145, 70, 255, 0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: white; margin-bottom: 0.5rem; }
        .accent { color: var(--twitch-purple); }
        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #3a3a3d;
            background: #0e0e10;
            color: white;
            box-sizing: border-box;
            margin-bottom: 1.2rem;
            font-size: 1rem;
        }
        button {
            background-color: var(--twitch-purple);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        button:hover { background-color: #772ce8; }
        #loader { display: none; margin-top: 15px; color: #adadb8; font-size: 0.9rem; }
        .status-tag { margin-top: 1.5rem; color: #00ff7f; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body onclick="document.getElementById('player').play().catch(() => {})">

    <div class="container">
        <h1>CreatorForge <span class="accent">AI</span></h1>
        <p style="color:#adadb8; margin-bottom: 1.5rem;">Panel de Voz (Beta)</p>
        
        <textarea id="textoInput" rows="3" placeholder="Escribe algo para Alonso..."></textarea>
        
        <button onclick="generarVoz()">⚡ ¡Hablar ahora!</button>
        
        <div id="loader">Cargando voz... 📡</div>
        
        <div class="status-tag">● Backend Online (Oregon)</div>
        
        <audio id="player"></audio>
    </div>

    <script>
        async function generarVoz() {
            const texto = document.getElementById('textoInput').value;
            const player = document.getElementById('player');
            const loader = document.getElementById('loader');
            
            // TU URL REAL DE RENDER
            const url_backend = "https://creatorforge-ai-2.onrender.com"; 
            
            if (!texto.trim()) return alert("¡Escribe algo primero!");

            loader.style.display = "block";
            loader.innerText = "Alonso está pensando... 🧠";

            // Creamos la URL con un truco de tiempo para evitar caché
            const finalUrl = `${url_backend}/tts?text=${encodeURIComponent(texto)}&voice=es-MX-AlonsoNeural&t=${Date.now()}`;
            
            player.src = finalUrl;
            
            player.oncanplaythrough = () => {
                loader.style.display = "none";
                player.play().catch(e => {
                    loader.innerText = "¡Haz clic en la página y pulsa de nuevo! 🖱️";
                });
            };

            player.onerror = () => {
                loader.innerText = "Despertando servidor... espera 10s ✨";
                setTimeout(() => player.load(), 5000);
            };
        }
    </script>

</body>
</html>
